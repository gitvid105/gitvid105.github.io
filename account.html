<!DOCTYPE html>
<html>
<head>
  <title>Account</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 220px;
      background: #f2f2f2;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .tab {
      padding: 10px;
      cursor: pointer;
      background: white;
      border: 1px solid #ccc;
    }

    .tab.active {
      background: #ddd;
    }

    .content {
      flex: 1;
      padding: 20px;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

<div class="sidebar">
  <div class="tab active" onclick="showTab('videos')">Your Videos</div>
  <div class="tab" onclick="showTab('account')">Manage Account</div>
</div>

<div class="content">

  <div id="videos">
    <h2>Your Videos</h2>
    <input type="file" id="upload" accept="video/*" />
<button onclick="uploadVideo()">Upload Video</button>
  </div>

  <div id="account" class="hidden">
    <h2>Manage Account</h2>

    <input id="username" placeholder="new username" />
    <button onclick="updateUsername()">Update username</button>

    <br><br>

    <input id="newpass" type="password" placeholder="new password" />
    <button onclick="updatePassword()">Change password</button>

    <br><br>

    <button onclick="logout()">Sign out</button>
  </div>

</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://qrxviajrlqzoxpewbrev.supabase.co",
  "sb_publishable_Ud5J0HvgWm2LWbH6W4oQLQ_wCXG6MEr"
);

window.showTab = function (tab) {
  document.getElementById("videos").classList.add("hidden");
  document.getElementById("account").classList.add("hidden");

  document.getElementById(tab).classList.remove("hidden");

  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  event.target.classList.add("active");
};

window.updateUsername = async function () {
  const username = document.getElementById("username").value;

  await supabase.auth.updateUser({
    data: { display_name: username }
  });
};

window.updatePassword = async function () {
  const newpass = document.getElementById("newpass").value;

  await supabase.auth.updateUser({
    password: newpass
  });
};

window.logout = async function () {
  await supabase.auth.signOut();
  window.location.href = "/";
};
  const bucket = "videos";

window.uploadVideo = async function () {
  const file = document.getElementById("upload").files[0];
  if (!file) return alert("Pick a video first");

  const fileName = `${Date.now()}-${file.name}`;

  const { error } = await supabase.storage
    .from(bucket)
    .upload(fileName, file);

  if (error) {
    console.log(error);
    alert("Upload failed");
    return;
  }

  alert("Upload successful!");
};
</script>

</body>
</html>
