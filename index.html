<!DOCTYPE html>
<html>
<head>
  <title>gitvid</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; margin: 0; background:#111; color:white; }

    .center {
      display:flex;
      height:100vh;
      align-items:center;
      justify-content:center;
      flex-direction:column;
    }

    input, button {
      padding:10px;
      margin:5px;
      width:250px;
    }

    #app { display:none; padding:20px; }
  </style>
</head>

<body>

<!-- LOGIN PAGE -->
<div id="login" class="center">
  <h1>gitvid login</h1>

  <input id="email" placeholder="email" />
  <button onclick="login()">Send Magic Link</button>

  <p id="msg"></p>
</div>

<!-- APP PAGE -->
<div id="app">
  <h1>gitvid</h1>

  <input type="file" id="fileInput" />
  <button onclick="uploadVideo()">Upload</button>

  <h2>Videos</h2>
  <div id="gallery"></div>

  <button onclick="logout()">Logout</button>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://qrxviajrlqzoxpewbrev.supabase.co",
  "sb_publishable_Ud5J0HvgWm2LWbH6W4oQLQ_wCXG6MEr"
);

const bucket = "videos";

/* ---------- AUTH ---------- */

window.login = async function () {
  const email = document.getElementById("email").value;

  const { error } = await supabase.auth.signInWithOtp({
    email
  });

  document.getElementById("msg").innerText =
    error ? error.message : "Check your email for login link";
};

window.logout = async function () {
  await supabase.auth.signOut();
  location.reload();
};

/* ---------- APP ---------- */

async function uploadVideo() {
  const file = document.getElementById("fileInput").files[0];
  if (!file) return alert("Pick a file");

  const path = `${Date.now()}-${file.name}`;

  const { error } = await supabase.storage
    .from(bucket)
    .upload(path, file);

  if (error) return alert(error.message);

  loadVideos();
}

async function loadVideos() {
  const { data } = await supabase.storage.from(bucket).list();

  const gallery = document.getElementById("gallery");
  gallery.innerHTML = "";

  data.forEach(file => {
    const url = supabase.storage.from(bucket)
      .getPublicUrl(file.name).data.publicUrl;

    const v = document.createElement("video");
    v.src = url;
    v.controls = true;
    v.width = 300;

    gallery.appendChild(v);
  });
}

window.uploadVideo = uploadVideo;

/* ---------- SESSION CHECK ---------- */

supabase.auth.getSession().then(({ data }) => {
  if (data.session) {
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";
    loadVideos();
  }
});
</script>

</body>
</html>
