<!DOCTYPE html>
<html>
<head>
  <title>gitvid</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: white;
      color: black;
    }

    header {
      display: flex;
      align-items: center;
      padding: 10px;
      border-bottom: 1px solid #ccc;
      gap: 10px;
    }

    .login-btn {
      background: #eee;
      border: 1px solid #ccc;
      color: black;
      padding: 8px 12px;
      cursor: pointer;
      border-radius: 6px;
    }

    .search {
      flex: 1;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #ccc;
      background: white;
      color: black;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 15px;
      padding: 15px;
    }

    .card {
      background: #f5f5f5;
      border-radius: 10px;
      overflow: hidden;
    }

    video {
      width: 100%;
      display: block;
    }

    .title {
      padding: 10px;
      font-size: 14px;
    }
  </style>
</head>

<body>

<header>
  <button class="login-btn" id="user-area" onclick="goAccount()">Login</button>
  <input class="search" id="search" placeholder="Search videos..." oninput="filterVideos()" />
</header>

<div class="grid" id="grid"></div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://qrxviajrlqzoxpewbrev.supabase.co",
  "sb_publishable_Ud5J0HvgWm2LWbH6W4oQLQ_wCXG6MEr"
);

const bucket = "videos";
let allVideos = [];

window.goAccount = async function () {
  const { data: { user } } = await supabase.auth.getUser();

  if (user) {
    window.location.href = "/account.html";
  } else {
    window.location.href = "/login.html";
  }
};

async function setUser() {
  const { data: { user } } = await supabase.auth.getUser();

  if (user) {
    document.getElementById("user-area").innerText =
      user.user_metadata?.display_name || user.email;
  }
}

async function loadVideos() {
  const { data } = await supabase.storage.from(bucket).list();

  allVideos = data || [];
  renderVideos(allVideos);
}

function renderVideos(videos) {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  videos.forEach(file => {
    const url = supabase.storage
      .from(bucket)
      .getPublicUrl(file.name).data.publicUrl;

    const card = document.createElement("div");
    card.className = "card";

    const video = document.createElement("video");
    video.src = url;
    video.controls = true;

    const title = document.createElement("div");
    title.className = "title";
    title.innerText = file.name;

    card.appendChild(video);
    card.appendChild(title);
    grid.appendChild(card);
  });
}

window.filterVideos = function () {
  const term = document.getElementById("search").value.toLowerCase();

  const filtered = allVideos.filter(v =>
    v.name.toLowerCase().includes(term)
  );

  renderVideos(filtered);
};

loadVideos();
setUser();
</script>

</body>
</html>
